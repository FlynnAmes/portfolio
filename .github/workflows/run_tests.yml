# .github/worklows/run_tests.yml

on:

    push:
        branches: ['master']
        paths:
          - 'credit_risk_project/**'

jobs: 
  Test:

# test on linux only for now
    runs-on: ${{ matrix.os }}
# define matrix (array of python versions to perform test action on) 
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", '3.14']
        os: [ubuntu-latest, windows-latest]
    steps:
# first clone the repo into the runner's VM
    - uses: actions/checkout@v5
# then set up python, using matrix of versions defined above
    - name: Setting up python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
# then install packages of repo, using pip and requirements file
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r credit_risk_project/requirements.txt
# now run test file using pytest
    - name: Run tests using pytest
      run: |
            pytest credit_risk_project/test_all.py

    


